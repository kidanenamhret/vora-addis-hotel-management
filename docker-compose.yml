services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vora_addis_hms
      POSTGRES_USER: vora
      POSTGRES_PASSWORD: vora_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/src/db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./backend/src/db/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vora -d vora_addis_hms"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgres://vora:vora_password@db:5432/vora_addis_hms
      JWT_SECRET: change-this-in-production
      JWT_EXPIRES_IN: 1d
      CLIENT_ORIGIN: http://localhost
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "5000:5000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
